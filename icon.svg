<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF5F0"/>
      <stop offset="100%" stop-color="#FFD1A9"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- ears -->
  <polygon points="120,180 80,60 200,140" fill="#FF8C69"/>
  <polygon points="392,180 432,60 312,140" fill="#FF8C69"/>
  <polygon points="130,170 105,90 190,145" fill="#FFB4A2"/>
  <polygon points="382,170 407,90 322,145" fill="#FFB4A2"/>
  <!-- face -->
  <ellipse cx="256" cy="270" rx="145" ry="135" fill="#FF8C69"/>
  <!-- eyes -->
  <ellipse cx="200" cy="250" rx="22" ry="24" fill="white"/>
  <ellipse cx="312" cy="250" rx="22" ry="24" fill="white"/>
  <circle cx="204" cy="248" r="12" fill="#5D4037"/>
  <circle cx="316" cy="248" r="12" fill="#5D4037"/>
  <circle cx="208" cy="244" r="4" fill="white"/>
  <circle cx="320" cy="244" r="4" fill="white"/>
  <!-- nose -->
  <ellipse cx="256" cy="290" rx="10" ry="8" fill="#E57373"/>
  <!-- mouth -->
  <path d="M246,298 Q256,310 266,298" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="298" x2="256" y2="308" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="140" y1="275" x2="70" y2="265" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="140" y1="290" x2="65" y2="295" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="372" y1="275" x2="442" y2="265" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="372" y1="290" x2="447" y2="295" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- paw -->
  <text x="256" y="430" text-anchor="middle" font-size="80">🐾</text>
</svg>
